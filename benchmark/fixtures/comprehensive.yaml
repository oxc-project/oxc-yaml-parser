# Comprehensive benchmark fixture (generated, committed for reproducibility).
# Exercises every syntax the parser handles: directives, `---`/`...` markers,
# all scalar styles (plain/single/double/literal/folded with chomping and
# indentation indicators), block and flow collections (nested), anchors,
# aliases, merge keys, shorthand/verbatim/handle/typed tags, explicit `?` keys,
# indentless sequences, comments, and non-ASCII content.
%YAML 1.2
%TAG !e! tag:example.com,2000:
--- !e!service
# ==== cycle 0: service config (block mapping, all scalar styles) ====
name: service-0              # trailing comment
enabled: true
disabled: false
replicas: 0
ratio: 3.14159
port: 8080
nothing: null
empty_value:
url: https://example.com/0/path?query=1&next=2#frag
range: 1..1
quoted_single: 'it''s value 0, with: an embedded colon'
quoted_double: "line one\nline two\ttab \"q\" é \U0001F600 no.0"
literal: |
  first content line 0
  second content line
  nested-looking:
    still literal text
folded: >
  folded text that gets
  rewrapped onto one line 0
strip: |-
  stripped block 0
keep: >+
  kept trailing breaks 0

explicit_indent: |2
    two-space indented body 0
café_unicode: naïve — 日本語のテキスト — emoji 🚀🔥 — 0
...
---
# ==== cycle 0: collections (block + flow, nested, explicit keys) ====
matrix:
  os: [linux, macos, windows]
  arch: [x64, arm64]
  nested: [[1, 2], [3, 4], {inline: map}]
empty_flow_map: {}
empty_flow_seq: []
flow_pairs: [a: 1, b: 2, lone-item, {x: y}]
inline: {name: n0, tags: [t1, t2, t3], meta: {a: 1, b: 2}}
steps:
  - run: echo build 0
  - name: checkout
    uses: actions/checkout@v4
  - {shell: bash, run: make test}
indentless:
  - one
  - two
  - three
? explicit-scalar-key-0
: an explicit value
? [composite, key, 0]
: composite-keyed value
deep:
  level1:
    level2:
      level3:
        - deeply nested item 0
        - another
...
---
# ==== cycle 0: anchors, aliases, tags, merge keys ====
defaults: &defaults-0
  timeout: 30
  retries: 3
  region: us-east-0
service_a:
  <<: *defaults-0
  name: alpha-0
service_b:
  <<: *defaults-0
  name: beta-0
  timeout: 60
typed_str: !!str 0000
typed_int: !!int 42
typed_map: !!map {a: 1, b: 2}
typed_seq: !!seq [x, y, z]
local_tag: !mytag some tagged value 0
verbatim_tag: !<tag:example.com,2000:custom> verbatim value
handle_tag: !e!widget gadget-0
anchored_seq: &seq-0
  - element x
  - element y
alias_to_seq: *seq-0
combined: &c-0 !!str combined anchor and tag 0
alias_to_combined: *c-0
...
# ==== cycle 0: plain scalars + multiline (bare document) ====
multiline_plain: this plain scalar starts here
  and folds onto a second line
  and then a third line 0
numbers: [0, -1, 3.14, 1e10, 0x1F, .inf, -.inf, .nan, 0]
booleans: [true, false, yes, no, on, off]
nulls: [null, ~]
dates: [2024-01-01, 2024-01-01T12:34:56Z]
colon_content: keep://this:as:plain/0
sequence of maps:
  - {id: 0, ok: true}
  - id: 1
    ok: false
...
